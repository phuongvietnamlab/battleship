<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battleship Spike · Instant Games WSS test</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #07182f; color: #e8f0ff; margin: 0; padding: 16px; }
    h1 { font-size: 16px; margin: 0 0 12px; }
    .row { margin: 6px 0; }
    .k { opacity: .6; }
    #status { display: inline-block; padding: 8px 12px; border-radius: 6px; font-weight: 600; }
    #status.ok { background: #0a7d3a; }
    #status.bad { background: #a32020; }
    code { font-family: ui-monospace, monospace; font-size: 12px; }
    #log { font-family: ui-monospace, monospace; font-size: 12px; white-space: pre-wrap;
           background: #0b1f3a; padding: 8px; border-radius: 6px; max-height: 40vh; overflow: auto; }
  </style>
  <!-- Only external script allowed inside an Instant Game: the fbinstant SDK -->
  <script src="https://connect.facebook.net/en_US/fbinstant.7.1.js"></script>
</head>
<body>
  <h1>⚓ Instant Games WSS / identity spike</h1>
  <div class="row"><span id="status">…</span></div>
  <div class="row"><span class="k">player.getID:</span> <code id="pid">—</code></div>
  <div class="row"><span class="k">getID stability:</span> <code id="stab">—</code></div>
  <div class="row"><span class="k">context:</span> <code id="ctx">—</code></div>
  <div class="row"><span class="k">identity source:</span> <code id="src">—</code></div>
  <div class="row"><span class="k">ping RTT:</span> <code id="rtt">—</code></div>
  <div class="row"><span class="k">log:</span></div>
  <div id="log"></div>
  <script src="app.js"></script>
</body>
</html>
