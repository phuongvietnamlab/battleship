<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Deletion Status · Battleship</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; padding: 32px 18px 64px;
      background: #07182f; color: #d8e6f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6; font-size: 16px;
    }
    .wrap { max-width: 600px; margin: 0 auto; text-align: center; }
    h1 { color: #f0c14b; font-size: 24px; margin: 0 0 16px; }
    .status { background: #0d2847; border: 1px solid #1d3553; border-radius: 8px; padding: 24px; margin: 24px 0; }
    .code { font-family: monospace; color: #6fc3f3; font-size: 14px; word-break: break-all; }
    .check { color: #4caf50; font-size: 48px; margin-bottom: 12px; }
    p { color: #9fb8d0; }
    a { color: #6fc3f3; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="check">✓</div>
    <h1>Data Deletion Complete</h1>

    <div class="status">
      <p>Your data associated with Battleship has been successfully deleted.</p>
      <p style="margin-top:16px; font-size:14px; color:#7f97b3;">Confirmation code:</p>
      <p class="code" id="code">—</p>
    </div>

    <p style="font-size:14px;">
      If you have questions, contact us at
      <a href="mailto:phuongpv@vietnamlab.vn">phuongpv@vietnamlab.vn</a>
    </p>
  </div>

  <script>
    // Display the confirmation code from the URL
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    if (code) {
      document.getElementById("code").textContent = code;
    }
  </script>
</body>
</html>
