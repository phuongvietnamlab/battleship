# Keeps the Render free web service awake so Googlebot (and the first real user)
# never hit a cold start. Pings the cheap /healthz endpoint on a schedule.
#
# SET YOUR URL: either edit KEEPALIVE_URL below, or define a repo variable
#   Settings → Secrets and variables → Actions → Variables → New: KEEPALIVE_URL
#
# NOTE: GitHub's scheduled crons run on a best-effort basis (can drift 5–15 min)
# and are auto-disabled after 60 days with no repo commits. For rock-solid
# uptime prefer an external monitor (UptimeRobot / cron-job.org) — see README.
name: keepalive

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (Render free sleeps after ~15 min idle)
  workflow_dispatch: {}        # allow manual run

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /healthz
        run: |
          URL="${{ vars.KEEPALIVE_URL || 'https://battleshiponline.xyz/healthz' }}"
          echo "Pinging $URL"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL" || echo "000")
          echo "HTTP $code"
          # Don't fail the workflow on a transient miss; the next run retries.
          if [ "$code" = "000" ]; then echo "::warning::no response (cold start or down)"; fi
