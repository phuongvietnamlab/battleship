# Fly.io config for the Battleship Socket.IO server.
# `fly launch --no-deploy` will set/confirm `app` and region; edit if needed.
# Singapore (sin) is the closest Fly region to Vietnam — lowest latency for live turns.
app = "battleship-spike"
primary_region = "sin"

[build]

[http_service]
  internal_port = 4000
  force_https = true
  # Keep 1 machine warm so there is no cold-start (matches the "no cold start" decision).
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
