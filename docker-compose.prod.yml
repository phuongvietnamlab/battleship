services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    env_file: .env
    environment:
      - DATABASE_URL=postgres://battleship:${DB_PASSWORD}@postgres:5432/battleship
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - PORT=4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    read_only: true
    tmpfs:
      - /tmp

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: battleship
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: battleship
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U battleship"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 60 100
      --save 300 1
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/lib/letsencrypt:/var/lib/letsencrypt
    depends_on:
      - app
    networks:
      - internal
      - external

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    volumes:
      - ./backups:/backups
    entrypoint: "/bin/sh -c 'while true; do sleep 86400; pg_dump -h postgres -U battleship battleship | gzip > /backups/battleship-$$(date +%Y%m%d-%H%M%S).sql.gz; find /backups -name \"*.sql.gz\" -mtime +7 -delete; done'"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge

volumes:
  pgdata:
  redisdata:
